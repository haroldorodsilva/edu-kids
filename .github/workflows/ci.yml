name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: digiletras/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: digiletras

      - name: Type check
        run: npx tsc --noEmit
        working-directory: digiletras

      - name: Lint
        run: npm run lint
        working-directory: digiletras

      - name: Tests
        run: npm test
        working-directory: digiletras

      - name: Build
        run: npm run build
        working-directory: digiletras
