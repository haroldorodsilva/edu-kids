name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: digiletras/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: digiletras

      - name: Type check
        run: npx tsc --noEmit
        working-directory: digiletras

      - name: Lint
        run: yarn lint
        working-directory: digiletras

      - name: Tests
        run: yarn test
        working-directory: digiletras

      - name: Build
        run: yarn build
        working-directory: digiletras
